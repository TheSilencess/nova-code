<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCode - Soluciones Web</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>
    <nav id="navbar">
        <div class="nav-container">
            <div class="logo">Nova<span>Code</span></div>
            <ul>
                <li><a href="index.html" class="active">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <div id="formulario">
        <h1>¡Contáctanos!</h1>
        <div id="formdata">
            <form action="#" id="formContacto">
                <div class="input-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Escribe tu nombre..." required>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="asunto">Asunto</label>
                    <select id="asunto">
                        <option value="web">Desarrollo Web</option>
                        <option value="app">Aplicación Móvil</option>
                        <option value="diseño">Diseño UI/UX</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" rows="5" placeholder="Cuéntanos sobre tu proyecto..." required></textarea>
                </div>

                <button type="submit" class="btn-enviar">Enviar Mensaje</button>
            </form>
        </div>
    </div>
    <footer id="footer">
        &copy; 2026 NovaCode - Todos los derechos reservados.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <script>
    emailjs.init("SmBIInoTurquNZzyj");

    document.getElementById("formContacto").addEventListener("submit", function(e) {
        e.preventDefault();

        emailjs.send("service_l7x311n", "template_ntl8u68", {
            nombre: document.getElementById("nombre").value,
            email: document.getElementById("email").value,
            asunto: document.getElementById("asunto").value,
            mensaje: document.getElementById("mensaje").value
        })
        .then(function() {
            alert("Mensaje enviado 😎");
        }, function(error) {
            alert("Error 😓");
            console.log(error);
        });
    });
</script>
</body>
</html>
